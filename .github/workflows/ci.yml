name: CI - Build and Push Docker images (amd64+arm64)

on:
  push:
    branches: [ "main", "docker-ci", "feature/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Вычислить имена образов и теги (в нижнем регистре)
        id: vars
        shell: bash
        run: |
          REPO_LC="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "image_front=ghcr.io/${REPO_LC}-frontend" >> "$GITHUB_OUTPUT"
          echo "image_back=ghcr.io/${REPO_LC}-backend" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./front/html
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.vars.outputs.image_front }}:latest
            ${{ steps.vars.outputs.image_front }}:${{ steps.vars.outputs.sha_tag }}
            ${{ steps.vars.outputs.image_front }}:${{ steps.vars.outputs.branch_tag }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.vars.outputs.image_back }}:latest
            ${{ steps.vars.outputs.image_back }}:${{ steps.vars.outputs.sha_tag }}
            ${{ steps.vars.outputs.image_back }}:${{ steps.vars.outputs.branch_tag }}
