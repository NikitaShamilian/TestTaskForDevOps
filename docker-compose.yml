version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./api
    env_file:
      - ./api/.env.example
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build: ./front/html
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  dbdata: